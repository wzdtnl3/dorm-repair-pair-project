<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的报修 - 宿舍报修系统</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div class="nav">
    <button class="primary" onclick="window.location.href='/new-order.html'">新建报修</button>
    <button class="secondary" onclick="window.location.href='/my-orders.html'">我的报修</button>
    <button class="secondary" onclick="logout()">退出登录</button>
</div>

    <div class="card">
        <h1>我的报修工单</h1>
        <p id="welcome" class="hint"></p >
    </div>

    <div class="card">
        <h2>工单列表</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>类别</th>
                <th>标题</th>
                <th>描述</th>
                <th>状态</th>
                <th>创建时间</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
const API_BASE = "/api";
const user = JSON.parse(localStorage.getItem("currentUser") || "null");

if (!user || user.role !== "student") {
    alert("请先以学生身份登录");
    window.location.href = "/login.html";
}

document.getElementById("welcome").textContent = `当前学生：${user.username}，宿舍：${user.dormitory || "未填写"}`;

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "/login.html";
}

function statusBadge(status) {
    if (status === "处理中") return '<span class="badge status-processing">处理中</span>';
    if (status === "已完成") return '<span class="badge status-done">已完成</span>';
    return '<span class="badge status-pending">待处理</span>';
}

async function loadOrders() {
    const response = await fetch(`${API_BASE}/orders/my?student_id=${user.id}`);
    const result = await response.json();
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (!result.success) {
        tbody.innerHTML = `<tr><td colspan="6" class="danger">${result.message}</td></tr>`;
        return;
    }

    if (!result.data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="hint">暂无报修记录</td></tr>';
        return;
    }

    result.data.forEach((item) => {
        tbody.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.category_name}</td>
                <td>${item.title}</td>
                <td>${item.description || ""}</td>
                <td>${statusBadge(item.status)}</td>
                <td>${item.create_time}</td>
            </tr>
        `;
    });
}

loadOrders();
</script>
</body>
</html>
